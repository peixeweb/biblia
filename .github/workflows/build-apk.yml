name: Build Android APK (TWA)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Bubblewrap CLI
        run: npm install -g @bubblewrap/cli

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Generate keystore for signing
        run: |
          keytool -genkeypair \
            -alias android \
            -keypass android \
            -storepass android \
            -dname "CN=Peixeweb, OU=Dev, O=Peixeweb, L=BR, ST=BR, C=BR" \
            -keystore android.keystore \
            -validity 10000 \
            -keyalg RSA \
            -keysize 2048

      - name: Configure Bubblewrap
        run: |
          mkdir -p ~/.bubblewrap
          echo "{\"jdkPath\":\"${JAVA_HOME}\",\"androidSdkPath\":\"${ANDROID_HOME}\"}" > ~/.bubblewrap/config.json

      - name: Initialize Bubblewrap project
        run: |
          bubblewrap init \
            --manifest=https://biblia-five-kappa.vercel.app/manifest.json \
            --directory=./android-app
        env:
          BUBBLEWRAP_DISABLE_TELEMETRY: true

      - name: Build APK
        run: |
          cd android-app
          bubblewrap build \
            --skipPwaValidation
        env:
          BUBBLEWRAP_DISABLE_TELEMETRY: true

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: biblia-pesquisa-apk
          path: |
            android-app/*.apk
            android-app/app/build/outputs/apk/**/*.apk
          retention-days: 30

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: biblia-pesquisa-aab
          path: android-app/app/build/outputs/bundle/**/*.aab
          retention-days: 30
          if-no-files-found: ignore
